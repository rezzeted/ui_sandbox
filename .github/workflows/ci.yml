name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (CMake)
        run: cmake -S . -B _build -G "Visual Studio 17 2022" -A x64

      - name: Build (Debug)
        run: cmake --build _build --config Debug

